; PgBouncer Configuration for Archive Project
;
; Installation:
;   apt install pgbouncer
;   or: docker run -d --name pgbouncer -p 6432:6432 \
;     -v /path/to/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini \
;     postgres
;
; Setup:
;   1. Place this file at /etc/pgbouncer/pgbouncer.ini
;   2. Create /etc/pgbouncer/userlist.txt with your credentials
;   3. Restart pgbouncer: sudo systemctl restart pgbouncer
;
; Security:
;   - listen_addr is set to 127.0.0.1 — never expose PgBouncer externally
;   - auth_type = trust is for internal/localhost use only
;   - For production, consider auth_type = md5 with auth_file

[databases]
; Wildcard: proxy any database name (dynamic tenant DBs)
; Format: * = host=<PG_HOST> port=5432
* = host=127.0.0.1 port=5432

[pgbouncer]
listen_port = 6432
listen_addr = 127.0.0.1
auth_type = trust
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 15
query_timeout = 120
query_wait_timeout = 120
client_idle_timeout = 0
client_login_timeout = 60
log_connections = 0
log_disconnections = 0
log_pool_errors = 1
ignore_startup_parameters = statement_timeout
